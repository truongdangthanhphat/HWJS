<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dự án Hình ảnh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Thư viện Ảnh</h1>
    
    <!-- Vùng hiển thị kết quả -->
    <div id="image">
        Hover over an image below to display here.
    </div>

    <!-- Các ảnh nhỏ với chú thích -->
    <div class="gallery">
        <!-- Ảnh 1 -->
        <figure class="preview-item">
            <img class="preview" src="https://picsum.photos/id/1/200/200" alt="Mô tả ảnh 1" onmouseover="upDate(this)" onmouseleave="unDo()">
            <figcaption>Chú thích ảnh 1</figcaption>
        </figure>

        <!-- Ảnh 2 -->
        <figure class="preview-item">
            <img class="preview" src="https://picsum.photos/id/2/200/200" alt="Mô tả ảnh 2" onmouseover="upDate(this)" onmouseleave="unDo()">
            <figcaption>Chú thích ảnh 2</figcaption>
        </figure>

        <!-- Ảnh 3 -->
        <figure class="preview-item">
            <img class="preview" src="https://picsum.photos/id/3/200/200" alt="Mô tả ảnh 3" onmouseover="upDate(this)" onmouseleave="unDo()">
            <figcaption>Chú thích ảnh 3</figcaption>
        </figure>
    </div>

    <script src="script.js"></script>
</body>
</html>
